<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device=1.0">
  <title>訂單處理工具</title>
  <!-- 保留必要的 CSS -->
  <link rel="stylesheet" href="styles.css">
  <!-- Firebase 腳本 -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <!-- 移除 fireworkeffect.js 的引用 -->
</head>
<body>
  <!-- 初始只顯示登入提示 -->
  <div id="login-placeholder">
    <p>請登入 Firebase 以使用工具。</p>
  </div>

  <script type="module">
    // 手動初始化 Firebase（複製 fireworkeffect.js 中的配置）
    const firebaseConfig = {
        apiKey: "AIzaSyAhgA5nFE3bLTVyudYjKctSpnTCIgORg8M",
      authDomain: "cstoolsapi.firebaseapp.com",
      projectId: "cstoolsapi",
      storageBucket: "cstoolsapi.firebasestorage.app",
      messagingSenderId: "632885029336",
      appId: "1:632885029336:web:f491b9cc28fe3f2504aaad"
    };
    window.firebase.initializeApp(firebaseConfig);

    // 檢查登入狀態
    window.firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        // 已登入，觸發登入成功事件
        window.dispatchEvent(new Event('firework-login-success'));
      } else {
        // 未登入，顯示提示
        console.log('用戶未登入');
      }
    });

    // 登入成功後，從 Firestore 獲取並替換內容
    window.addEventListener('firework-login-success', async () => {
      console.log('登入成功事件觸發');
      try {
        const docRef = window.firebase.firestore().collection('protectedTools').doc('transferTool');
        const docSnap = await docRef.get();
        console.log('Firestore 讀取成功:', docSnap.exists);
        
        if (docSnap.exists) {
          const data = docSnap.data();
          const toolHTML = data.toolHTML;
          
          // 替換整個 body 內容
          document.body.innerHTML = toolHTML;
          
          // 重新初始化腳本
          initializeToolScripts();
        } else {
          console.error('文檔不存在');
          document.body.innerHTML = '<p>工具內容載入失敗，請聯繫管理員。</p>';
        }
      } catch (error) {
        console.error('Firestore 錯誤:', error);
        document.body.innerHTML = '<p>載入工具失敗，請檢查網路或權限。</p>';
      }
    });

    // 登出時，恢復登入提示
    window.addEventListener('firework-logout-success', () => {
      document.body.innerHTML = `
        <div id="login-placeholder">
          <p>請登入 Firebase 以使用工具。</p>
        </div>
      `;
    });

    // 自定義函數：重新初始化工具腳本
    function initializeToolScripts() {
      // 重新執行原有的初始化邏輯，例如：
      // - 綁定事件監聽器
      // - 初始化變數
      // - 載入模組（如 fusearch.js, draggable.js）
      
      // 示例：重新載入模組
      import('../script/fusearch.js').then(() => {
        // 初始化 fusearch
      });
      import('../script/draggable.js').then(({ makeDraggable }) => {
        // 重新初始化拖拽
        const panel = document.getElementById('fudausearch-container');
        const handle = panel.querySelector('.fudausearch-drag-handle');
        makeDraggable(panel, handle, { left: 300, top: 185, color: '#a9bcc7' });
      });
      
      // 重新綁定其他事件，例如 searchButton, copyButton 等
      // ...（複製原有的 addEventListener 邏輯）
    }
  </script>
</body>
</html>
