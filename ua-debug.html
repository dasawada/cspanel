<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Environment Forensics</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #0f0; padding: 20px; word-break: break-all; }
        .critical { color: #ff3333; font-weight: bold; }
        .safe { color: #33ff33; }
        .data-block { background: #2a2a2a; border: 1px solid #444; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        h3 { border-bottom: 1px solid #555; padding-bottom: 5px; margin-top: 0; }
    </style>
</head>
<body>
    <h2>🕵️ 深度環境鑑識報告</h2>
    <div id="report">正在進行深度掃描...</div>

    <script>
        (function() {
            const result = {
                verdict: "Unknown", // 最終判決
                risk_score: 0,      // 風險分數 (0-100)
                evidence: []        // 證據鏈
            };

            // === 1. JS Bridge / 注入物探測 (Injection Probe) ===
            // 這是最強的證據，直接證明被特定的 App 包覆
            const knownBridges = [
                { key: 'Line', risk: 100, id: 'Line App' },
                { key: '_LINE_Icon', risk: 100, id: 'Line App' },
                { key: 'facebookConnectPlugin', risk: 100, id: 'Facebook App' },
                { key: '__fbNative', risk: 100, id: 'Facebook App' },
                { key: 'TelegramWebview', risk: 100, id: 'Telegram' },
                { key: 'micromessenger', risk: 100, id: 'WeChat' },
                { key: 'gsa', risk: 90, id: 'Google Search App' },
                { key: 'webkit', risk: 50, id: 'Generic WebKit WebView' } // 一般 WebView 常見
            ];

            let bridgesFound = [];
            knownBridges.forEach(bridge => {
                // 檢查 window 下是否存在該屬性
                if (window[bridge.key] !== undefined || (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers[bridge.key])) {
                    bridgesFound.push(bridge.id);
                    result.risk_score += bridge.risk;
                    result.evidence.push(`[Injection] Found bridge: ${bridge.key}`);
                }
            });

            // === 2. 錯誤堆疊鑑識 (Stack Trace Forensics) ===
            // 許多 App 在執行 JS 時，錯誤堆疊會包含 App 的 Bundle ID
            try {
                throw new Error("Probe");
            } catch (e) {
                const stack = e.stack || "";
                // 常見的 WebView 關鍵字
                if (/FBAV|Line|GSA|IAB|WebView/i.test(stack)) {
                    result.risk_score += 80;
                    result.evidence.push(`[Stack] Trace reveals App signature`);
                }
            }

            // === 3. Safari 完整性檢查 (Safari Integrity Check) ===
            // iOS Safari 有特定的 window.safari 物件，而 WebView 通常沒有，或結構不同
            const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            if (isIOS) {
                const isSafariObj = typeof window.safari === 'object';
                const isStandalone = window.navigator.standalone === true;
                
                // PWA (Standalone) 也是一種 WebView，需要區分
                if (isStandalone) {
                    result.evidence.push(`[Mode] iOS Standalone Mode (PWA)`);
                    // PWA 雖然不是 Safari，但通常是使用者主動行為，風險較低，但無網址列
                } else if (!isSafariObj) {
                    // 在 iOS 上卻沒有 window.safari，極大機率是 UIWebView/WKWebView
                    result.risk_score += 60;
                    result.evidence.push(`[Integrity] Missing 'window.safari' object on iOS`);
                } else if (isSafariObj && !window.safari.pushNotification) {
                    // 有 safari 物件但功能殘缺 (常見於較高階的偽裝 WebView)
                    result.risk_score += 40;
                    result.evidence.push(`[Integrity] 'window.safari' exists but incomplete`);
                }
            }

            // === 4. 功能限制行為 (Behavioral Restrictions) ===
            // 檢測是否被「沙盒化」
            
            // 測試 4.1: Iframe 注入測試 (某些 WebView 禁止 iframe 或對其有特殊限制)
            // (此處僅為邏輯示範，實際執行可能會影響 DOM)
            
            // 測試 4.2: Session Storage 易失性測試的推論
            // 如果 history.length 為 1 且 referer 為空，且在 Mobile 環境，高度可疑
            if (history.length === 1 && document.referrer === "" && /Mobile/.test(navigator.userAgent)) {
                 result.risk_score += 20;
                 result.evidence.push(`[Heuristic] Single history entry without referrer`);
            }

            // === 5. 幾何視覺視口 (Visual Viewport) ===
            // 比 window.innerHeight 更準確，能反映鍵盤或特定 UI 的擠壓
            if (window.visualViewport) {
                const vvScale = window.visualViewport.scale;
                // WebView 預設 scale 行為可能與瀏覽器不同，但需更多樣本對比
                // 這裡主要紀錄高度比
                const heightRatio = (window.innerHeight / window.screen.availHeight);
                if (heightRatio < 0.75) {
                    result.risk_score += 30;
                    result.evidence.push(`[Geometry] Viewport heavily obstructed (Ratio: ${heightRatio.toFixed(2)})`);
                }
            }

            // === 綜合判決 ===
            if (bridgesFound.length > 0) {
                result.verdict = `Confirmed In-App Browser (${bridgesFound.join(', ')})`;
            } else if (result.risk_score >= 60) {
                result.verdict = "Highly Suspicious WebView";
            } else if (result.risk_score >= 30) {
                result.verdict = "Potential Non-Standard Environment";
            } else {
                result.verdict = "Likely Standard Browser";
            }

            // === 輸出 ===
            const outputHTML = `
                <div class="data-block">
                    <h3>⚖️ 最終判決 (Verdict)</h3>
                    <div class="${result.risk_score > 50 ? 'critical' : 'safe'}">
                        ${result.verdict} (Risk Score: ${result.risk_score})
                    </div>
                </div>
                <div class="data-block">
                    <h3>🔍 證據鏈 (Evidence Chain)</h3>
                    ${result.evidence.length > 0 ? 
                        `<ul>${result.evidence.map(e => `<li>${e}</li>`).join('')}</ul>` : 
                        "<div>No anomaly detected.</div>"}
                </div>
                <div class="data-block">
                    <h3>🧬 原始特徵 (Raw Signals)</h3>
                    <div>UA: ${navigator.userAgent}</div>
                    <div>Ref: ${document.referrer || "None"}</div>
                </div>
            `;
            
            document.getElementById('report').innerHTML = outputHTML;
        })();
    </script>
</body>
</html>
