<!DOCTYPE html><html><head><meta charset="utf-8"><title>fudausearch repro fixture</title></head><body>
<!--
  子專案 A 回歸 fixture：重現「轉單頁自帶 markup + Firebase null-first」的
  clear/inject 生命週期。三步（makeDraggable → clear → init）後量測：
  修好後 window.__snap 應為 { containers: 1, dragHandles: 1 }
  （壞的是 { containers: 2, dragHandles: 0 }）。用 tools/fudau-repro.mjs 跑。
-->
<div id="app-container">
  <div class="fudausearch-container" id="fudausearch-container" style="z-index:998;">
    <div class="fudausearch-drag-handle" id="fudausearch-drag-handle">職代是誰</div>
    <button class="fudausearch-fixed-button" id="fudausearch-fixed-button" style="display:none;">學務部</button>
    <div class="fudausearch-input-wrapper">
      <input type="text" id="fudausearch-input" autocomplete="off"/>
      <button class="fudausearch-clear-btn" id="fudausearch-clear-btn">x</button>
      <div id="fudausearch-suggestions" class="fudausearch-suggestions"></div>
    </div>
    <div id="fudausearch-results"></div>
  </div>
</div>
<script type="module">
  import { makeDraggable } from '/script/draggable.js';
  import { initFudausearchPanel, clearFudausearchPanel } from '/script/fusearch-panel.js';
  const panel = document.getElementById('fudausearch-container');
  const handle = panel.querySelector('.fudausearch-drag-handle');
  makeDraggable(panel, handle, { left:300, top:185, color:'#a9bcc7'});
  // 模擬「Firebase null-first + 反覆登出/登入」多輪 clear→init 循環：非破壞式 clear
  // 應讓容器/把手全程存活、init guard 見 input 尚在即略過注入，故不論幾輪都維持
  // 單層容器與把手（破壞式 clear 第一輪就變成 {containers:2, dragHandles:0}）。
  clearFudausearchPanel('fudausearch-container');   // 首次 null 回呼
  initFudausearchPanel('fudausearch-container');     // 首次登入
  clearFudausearchPanel('fudausearch-container');   // 登出
  initFudausearchPanel('fudausearch-container');     // 再登入
  clearFudausearchPanel('fudausearch-container');   // 再登出
  initFudausearchPanel('fudausearch-container');     // 再登入
  // 綁定冪等性：handler 為模組層級具名函式，瀏覽器 addEventListener 對「同型別 +
  // 同參照 + 同 capture」本就去重，故重複 bind 不累積監聽器；fusearch-panel.js 的
  // removeEventListener→addEventListener 為明示防禦。此處 dispatch 一次 input 事件，
  // 確認多輪 init 後事件路徑仍可運作、不拋錯。
  const input = document.getElementById('fudausearch-input');
  let dispatchOk = true;
  try {
    input.value = 'x';
    input.dispatchEvent(new Event('input'));
    input.value = '';
    input.dispatchEvent(new Event('input'));
  } catch (e) { dispatchOk = false; }
  window.__snap = {
    containers: document.querySelectorAll('.fudausearch-container').length,
    dragHandles: document.querySelectorAll('.fudausearch-drag-handle').length,
    hasInput: !!document.getElementById('fudausearch-input'),
    hasResults: !!document.getElementById('fudausearch-results'),
    dispatchOk,
  };
</script></body></html>
