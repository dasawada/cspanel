<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境檢查</title>
    <style>
        /* 樣式設定 (保持簡潔美觀) */
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 420px; padding: 30px 25px; border-radius: 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: none; /* JS 控制顯示 */ }
        
        .icon-warning { font-size: 40px; margin-bottom: 15px; display: block; }
        h2 { margin: 0 0 15px 0; color: #2c3e50; font-size: 20px; font-weight: bold; }
        
        /* 重點提示區塊 */
        .alert-box {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            text-align: left;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .btn { display: block; width: 100%; padding: 14px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-bottom: 12px; box-sizing: border-box; border: none; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-primary { background: #007AFF; color: white; box-shadow: 0 2px 5px rgba(0,122,255,0.3); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { background: #e9ecef; color: #555; }

        /* 底部小字 */
        .footer-note { font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="card-android" class="card">
        <span class="icon-warning">🛡️</span>
        <h2>瀏覽器環境檢測</h2>
        
        <div class="alert-box">
            <strong>⚠️ 請注意：</strong><br>
            部分 <strong>Google 搜尋 App</strong> 或 <strong>LINE</strong> 無法支援視訊功能。
            <br><br>
            不管您現在使用何種瀏覽器，請務必<strong>點擊下方藍色按鈕</strong>，系統將強制切換至標準模式以確保連線。
        </div>
        
        <a id="btn-default" href="#" class="btn btn-primary">
            確保使用系統瀏覽器開啟 🚀
        </a>

        <button class="btn btn-secondary" onclick="copyLink()">
            複製連結
        </button>

        <div class="footer-note">
            點擊按鈕後若無反應，請使用「複製連結」並手動開啟 Chrome 貼上。
        </div>
    </div>

    <div id="card-ios" class="card">
        <h2>不支援的瀏覽器</h2>
        <p>請點擊右下角選單，選擇「在瀏覽器中開啟」。</p>
        <button class="btn btn-secondary" onclick="copyLink()">複製連結</button>
    </div>

    <script>
        const TARGET_URL = "https://onelinkplus.oneclass.com.tw"; // ★ 請替換

        (function() {
            const ua = navigator.userAgent;
            const isAndroid = /Android/i.test(ua);
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            // 針對 iOS 仍需判斷是否為 In-App，因為 iOS Safari 是可以直通的
            const isIOSInApp = isIOS && (/Line\/|FBAV|Instagram/i.test(ua)); 

            if (isAndroid) {
                // ======================================
                // Android 策略：無差別攔截 (針對偽裝 GSA)
                // ======================================
                document.getElementById("card-android").style.display = "block";

                const cleanUrl = TARGET_URL.replace(/^https?:\/\//, '');
                
                // 使用隱式 Intent + New Task Flag
                // 這能有效穿透 GSA 的偽裝，強制喚醒外部瀏覽器
                const intentUrl = "intent://" + cleanUrl + 
                                  "#Intent;" + 
                                  "scheme=https;" + 
                                  "action=android.intent.action.VIEW;" + 
                                  "category=android.intent.category.BROWSABLE;" + 
                                  "launchFlags=0x10000000;" + 
                                  "end;";
                
                document.getElementById("btn-default").href = intentUrl;

            } else if (isIOSInApp) {
                // iOS In-App
                document.getElementById("card-ios").style.display = "block";
            } else {
                // PC 或 純 iOS Safari -> 放行
                window.location.replace(TARGET_URL);
            }
        })();

        function copyLink() {
            navigator.clipboard.writeText(TARGET_URL)
                .then(() => alert("網址已複製！請開啟 Chrome/Safari 貼上"))
                .catch(() => prompt("請手動複製：", TARGET_URL));
        }
    </script>
</body>
</html>
