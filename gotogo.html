<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瀏覽器切換</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 400px; padding: 30px 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: none; }
        
        h2 { margin: 0 0 15px 0; color: #2c3e50; font-size: 20px; }
        p { font-size: 14px; color: #666; margin-bottom: 25px; line-height: 1.5; }

        /* 按鈕樣式 */
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-bottom: 12px; box-sizing: border-box; border: none; cursor: pointer; font-size: 16px; transition: 0.2s; }
        
        /* 主要按鈕：藍色 */
        .btn-primary { background: #007AFF; color: white; box-shadow: 0 2px 5px rgba(0,122,255,0.3); }
        .btn-primary:active { transform: scale(0.98); }

        /* 次要按鈕：灰色 */
        .btn-secondary { background: #e9ecef; color: #555; }

        /* 底部手動連結區 */
        .manual-links { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; font-size: 13px; color: #888; }
        .manual-links a { color: #007AFF; text-decoration: none; margin: 0 5px; display: inline-block; padding: 5px; }
    </style>
</head>
<body>

    <div id="card-android" class="card">
        <h2>請切換瀏覽器</h2>
        <p>為確保視訊功能正常，<br>請點擊下方按鈕切換至外部瀏覽器。</p>
        
        <a id="btn-smart" href="#" class="btn btn-primary">
            開啟瀏覽器
        </a>

        <button class="btn btn-secondary" onclick="copyLink()">
            複製連結
        </button>

        <div class="manual-links">
            找不到瀏覽器？試試手動選擇：<br>
            <a id="link-force-chrome" href="#">Chrome</a> | 
            <a id="link-force-samsung" href="#">三星瀏覽器</a>
        </div>
    </div>

    <div id="card-ios" class="card">
        <h2>不支援的瀏覽器</h2>
        <p>請點擊右下角選單，選擇「在瀏覽器中開啟」。</p>
        <button class="btn btn-secondary" onclick="copyLink()">複製連結</button>
    </div>

    <script>
        const TARGET_URL = "https://onelinkplus.oneclass.com.tw"; // ★ 請替換網址

        (function() {
            const ua = navigator.userAgent;
            const isAndroid = /Android/i.test(ua);
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            // 偵測 In-App (包含 GSA, LINE, FB)
            const isInApp = /Line\/|FBAV|GSA\/|Instagram/i.test(ua) || (isAndroid && !ua.includes("Chrome/")); 

            // ==========================================
            // 核心邏輯：Android 智慧分流
            // ==========================================
            if (isAndroid) {
                document.getElementById("card-android").style.display = "block";
                
                const cleanUrl = TARGET_URL.replace(/^https?:\/\//, '');
                const btnSmart = document.getElementById("btn-smart");

                // 定義目標 Intent 字串
                // 1. Chrome (使用 scheme 協議，穿透力最強)
                //    注意：googlechrome:// 是非標準協議，但在 GSA 內通常比 intent:// 有效
                const chromeUrl = TARGET_URL.replace(/^https?/, 'googlechrome');

                // 2. Samsung Internet (使用 Explicit Intent)
                const samsungIntent = "intent://" + cleanUrl + 
                                      "#Intent;" + 
                                      "scheme=https;" + 
                                      "package=com.sec.android.app.sbrowser;" + // ★ 指定三星
                                      "action=android.intent.action.VIEW;" + 
                                      "category=android.intent.category.BROWSABLE;" + 
                                      "launchFlags=0x10000000;" + 
                                      "end;";

                // 3. 偵測邏輯
                // 檢查 UA 是否包含 "Samsung" 或 "SM-" (常見型號前綴)
                const isSamsungDevice = /Samsung|SM-|SEC/i.test(ua);

                if (isSamsungDevice) {
                    // --- 情境 A：偵測到三星特徵 ---
                    btnSmart.innerText = "開啟 Samsung 瀏覽器";
                    btnSmart.href = samsungIntent;
                } else {
                    // --- 情境 B：其他 Android 或 無法識別廠商 (您的 UA 屬於此類) ---
                    // 策略：優先賭 Chrome，因為市佔率最高
                    btnSmart.innerText = "開啟 Chrome 瀏覽器";
                    btnSmart.href = chromeUrl; 
                }

                // --- 設定底部的手動連結 (作為備用) ---
                document.getElementById("link-force-chrome").href = chromeUrl;
                document.getElementById("link-force-samsung").href = samsungIntent;

            } else if (isIOS && isInApp) {
                document.getElementById("card-ios").style.display = "block";
            } else {
                // PC 或 純 iOS Safari -> 放行
                window.location.replace(TARGET_URL);
            }
        })();

        function copyLink() {
            navigator.clipboard.writeText(TARGET_URL)
                .then(() => alert("已複製！請開啟瀏覽器貼上"))
                .catch(() => prompt("請手動複製：", TARGET_URL));
        }
    </script>
</body>
</html>
