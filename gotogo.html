<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳轉確認</title>
    <style>
        /* 樣式保持簡潔 */
        body { font-family: system-ui, -apple-system, sans-serif; background: #f2f2f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 32px 24px; border-radius: 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: none; }
        h2 { margin: 0 0 12px 0; font-size: 20px; color: #1c1c1e; }
        p { color: #636366; font-size: 15px; margin-bottom: 24px; line-height: 1.5; }
        
        /* 按鈕樣式 */
        .btn { display: block; width: 100%; padding: 16px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 16px; margin-bottom: 12px; border: none; cursor: pointer; box-sizing: border-box; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        
        /* Chrome 專用色 */
        .btn-chrome { background-color: #1a73e8; color: white; }
        
        /* 三星 / 備用選項 */
        .link-secondary { display: inline-block; margin-top: 12px; color: #007AFF; font-size: 14px; text-decoration: none; padding: 8px; }
        .divider { margin: 15px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="card-android" class="card">
        <h2>🔒 解除瀏覽器限制</h2>
        <p>Google 搜尋 App 無法支援此視訊功能。<br>請點擊下方按鈕切換至 Chrome。</p>
        
        <a id="btn-chrome" href="#" class="btn btn-chrome">
            開啟 Chrome 瀏覽器
        </a>

        <div style="margin-top: 10px;">
            <a id="link-samsung" href="#" class="link-secondary">
                使用 Samsung Internet 開啟
            </a>
        </div>

        <div class="divider"></div>

        <button class="btn" style="background:#e5e5ea; color:#000;" onclick="copyLink()">
            複製連結
        </button>
    </div>

    <div id="card-ios" class="card">
        <h2>瀏覽器不支援</h2>
        <p>請點擊右下角選單，選擇「在瀏覽器中開啟」。</p>
        <button class="btn" style="background:#007AFF; color:white;" onclick="copyLink()">複製連結</button>
    </div>

    <script>
        const TARGET_URL = "https://onelinkplus.oneclass.com.tw"; // ★ 請替換

        (function() {
            const ua = navigator.userAgent;
            const isAndroid = /Android/i.test(ua);
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            // 針對 iOS 判斷 In-App
            const isIOSInApp = isIOS && (/Line\/|FBAV|Instagram/i.test(ua)); 

            if (isAndroid) {
                // ============================================
                // Android 邏輯：強制指定 Package
                // ============================================
                document.getElementById("card-android").style.display = "block";
                
                const cleanUrl = TARGET_URL.replace(/^https?:\/\//, '');
                const flags = "launchFlags=0x10000000;"; // 等同於 target="_blank" 的強制力

                // A. Chrome Intent (明確指定 com.android.chrome)
                // 這能解決 GSA 攔截問題
                const chromeIntent = "intent://" + cleanUrl + 
                                     "#Intent;" + 
                                     "scheme=https;" + 
                                     "package=com.android.chrome;" + // ★ 關鍵：鎖定 Chrome
                                     "action=android.intent.action.VIEW;" + 
                                     "category=android.intent.category.BROWSABLE;" + 
                                     flags + 
                                     "end;";
                
                document.getElementById("btn-chrome").href = chromeIntent;

                // B. Samsung Intent (明確指定 com.sec.android.app.sbrowser)
                // 給三星使用者的手動選項
                const samsungIntent = "intent://" + cleanUrl + 
                                      "#Intent;" + 
                                      "scheme=https;" + 
                                      "package=com.sec.android.app.sbrowser;" + // ★ 關鍵：鎖定 Samsung
                                      "action=android.intent.action.VIEW;" + 
                                      "category=android.intent.category.BROWSABLE;" + 
                                      flags + 
                                      "end;";

                document.getElementById("link-samsung").href = samsungIntent;

            } else if (isIOSInApp) {
                document.getElementById("card-ios").style.display = "block";
            } else {
                window.location.replace(TARGET_URL);
            }
        })();

        function copyLink() {
            navigator.clipboard.writeText(TARGET_URL)
                .then(() => alert("連結已複製！請手動開啟瀏覽器貼上"))
                .catch(() => prompt("請手動複製：", TARGET_URL));
        }
    </script>
</body>
</html>
